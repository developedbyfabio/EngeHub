<VirtualHost *:80>
    ServerName 192.168.11.201
    ServerAlias engehub.local
    DocumentRoot /var/www/EngeHub/public
    
    <Directory /var/www/EngeHub/public>
        AllowOverride All
        Require all granted
    </Directory>
    
    ErrorLog ${APACHE_LOG_DIR}/engehub_error.log
    CustomLog ${APACHE_LOG_DIR}/engehub_access.log combined
    
    # Configurações de segurança
    # ServerTokens Prod
    # ServerSignature Off
    
    # Headers de segurança
    Header always set X-Content-Type-Options nosniff
    Header always set X-Frame-Options DENY
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    
    # Configurações de cache para assets
    <FilesMatch "\.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$">
        ExpiresActive On
        ExpiresDefault "access plus 1 month"
        Header set Cache-Control "public, immutable"
    </FilesMatch>
    
    # Configurações de cache para HTML
    <FilesMatch "\.(html|htm)$">
        ExpiresActive On
        ExpiresDefault "access plus 1 hour"
        Header set Cache-Control "public, must-revalidate"
    </FilesMatch>
</VirtualHost> 